spring:
  application:
    name: payment-service

server:
  port: 8082

payment:
  service:
    initial-balance: 100000

logging:
  level:
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.web.reactive: DEBUG
    ru.art.home.payment: DEBUG
    reactor.netty: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics