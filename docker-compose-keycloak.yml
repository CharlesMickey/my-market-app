services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: bom-bom-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=localhost
    ports:
      - "8085:8080"
    command: start-dev
    networks:
      - bom-bom-network

networks:
  bom-bom-network:
    external: true