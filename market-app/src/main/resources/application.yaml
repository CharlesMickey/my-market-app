spring:
  application:
    name: market

  r2dbc:
    url: r2dbc:h2:mem:///marketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password:
      timeout: 60s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  sql:
    init:
      platform: h2
      schema-locations: classpath:schemas/schema.sql
      data-locations: classpath:schemas/data.sql
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false
    prefix: classpath:/templates/

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

  cache:
    type: redis
    redis:
      time-to-live: 120000

server:
  port: 8080

payment:
  service:
    url: http://payment-service:8081

logging:
  level:
    org.springframework: INFO
    org.springframework.data.redis: DEBUG
    ru.art.home.market: DEBUG
    reactor.netty: DEBUG
