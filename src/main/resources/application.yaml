spring:
  application:
    name: market

  r2dbc:
    url: r2dbc:h2:mem:///marketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  sql:
    init:
      platform: h2
      schema-locations: classpath:schemas/schema.sql
      data-locations: classpath:schemas/data.sql
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false
    prefix: classpath:/templates/

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: 8080

logging:
  level:
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.web.reactive: DEBUG
    ru.art.home.market: DEBUG
    reactor.netty: DEBUG
